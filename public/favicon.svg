<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#07101c"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="14" stroke="#7ecba1" stroke-width="1" fill="none" opacity="0.8"/>
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="10" stroke="#c4b4e8" stroke-width="0.6" fill="none" opacity="0.5"/>
  <!-- AA monogram -->
  <text x="16" y="21" text-anchor="middle" font-size="13" font-weight="900"
        font-family="Inter,Arial,sans-serif" letter-spacing="-1"
        fill="url(#g)">AA</text>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7ecba1"/>
      <stop offset="50%"  stop-color="#c4b4e8"/>
      <stop offset="100%" stop-color="#f5c87a"/>
    </linearGradient>
  </defs>
</svg>
